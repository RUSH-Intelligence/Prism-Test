# ============================================================================
# ReAttention baseline — STANDALONE (no KV-compression sketch, no other method)
# ============================================================================
# Runs the paper-faithful ReAttention port (`reattention_exact`) by itself.
# This configuration reproduced the ReAttention paper's RULER numbers
# (2026-06-11, Meta-Llama-3-8B @ ruler16k):
#   niah_single_1   = 100.0  (200/200, verified end-to-end, job 135274)
#   niah_single_3   ≈ 94     (paper target)
#   niah_multikey_3 ≈ 15     (paper target — near-floor is CORRECT; don't chase higher)
#
#   python -m eval_harness.cli run --config_file ./evaluate/evaluate_reattention.yaml
#
# NOTE: `reattention_exact` reproduces the ORIGINAL ReAttention computation
# (chunked prefill + pre-attention recall + contiguous re-rotation) — this is
# the real context-extension baseline.  The hook port (`attention_method:
# reattention`) only reproduces the retention POLICY (exact prefill, pruned
# decode cache) and is position-OOD beyond 8192 — it measures pruning, not
# extension.  Use this file for the paper baseline.

# Available benchmarks:
#   aime, aime2024, aime2025, gsm_infinite_hard_128k, gsm_infinite_medium_128k,
#   gsm_infinite_symbolic_128k, infinite_bench, mock_benchmark,
#   ruler, ruler16k, ruler32k, ruler64k, ruler128k,
#   longbench, longbenchv2, loft, loft_rag, loogle, prism1m, zero_scrolls
benchmark: ruler16k
# Comma-separated subset list; null = all benchmark defaults.  Default here:
# the three verified reproduction anchors (see header).
subsets: niah_single_1,niah_single_3,niah_multikey_3

# Inference backend: vllm | hf | rag | research  (prefill methods need research)
backend: research

# Gated HF repo: accept the Meta license on the Hub and authenticate
# (HF_TOKEN / `huggingface-cli login`) before running.  This is the BASE
# model (no chat template): pipeline.preprocess uses bos_token + raw context,
# which is the intended RULER base-model formatting (and the paper's setup).
model: meta-llama/Meta-Llama-3-8B

# Runtime
tensor_parallel_size: 1        # vLLM-only; ignored by the research backend (single-GPU .to("cuda"))
dtype: bfloat16                # keep bf16/fp16: the flash-attn fast paths require it (fp32
                               # silently falls back to torch); einsum_topk auto-casts to bf16
max_model_len: 18000           # pipeline truncation cap for ruler16k (research_adapter.py:64 —
                               # used because research_config.max_context_length below is null).
                               # Raise for longer benchmarks (e.g. 66000 for ruler64k).
gpu_memory_utilization: 0.9    # vLLM-only; ignored by the research backend
trust_remote_code: true
enable_prefix_caching: true    # vLLM-only; ignored by the research backend

# Generation
max_new_tokens: 128
temperature: 0.0               # greedy, as in the reference eval
top_p: 1.0
system_prompt: null
seed: 42

# Evaluation limits (max_requests applies PER SUBSET — runner.py:79)
max_requests: 200
fraction: 1.0
query_aware: false

# Method-specific subdir: the auto-named run dir encodes benchmark/model/
# backend but NOT the prefill method, so distinct baselines sharing a model
# would otherwise write to the same directory.
output_dir: ./results/reattention

llm_kwargs:
  # runner._setup_adapter (runner.py:141) defaults this to sdpa anyway, and it
  # cannot affect outputs here: reattention_exact REPLACES every full-attention
  # layer's self_attn.forward and discards the HF-provided position_embeddings/
  # attention_mask, so the model-level impl never reaches the attention math.
  # sdpa is the validated load/parity path.
  attn_implementation: sdpa

  # This dict becomes research_adapter.ResearchConfig (runner.py:144-145).
  research_config:
    # --- KV-compression sketch: OFF (this file is the pure baseline) --------
    # MUST stay none with reattention_exact: the method requires an unpruned
    # raw-KV cache (cache index == absolute position); any sketch rewriting
    # the cache trips its RuntimeError guard (reattention_exact.py).
    kv_compressor: none               # "none" = no sketch hooks installed
    compression_ratio: 0.0          # unused while kv_compressor is none
    max_context_length: null        # null -> fall back to max_model_len above
    log_cache_seq_len: false        # true logs cache lengths (full context here — never pruned)

    # --- Prefill method (context extension) --------------------------------
    # ReAttention EXACT: full self_attn.forward replacement reproducing the
    # original computation — raw (pre-RoPE) K/V cache for the whole context
    # (never pruned), chunked prefill, PRE-attention recall per chunk and
    # (recall_option: whole) per decode step, RoPE applied after selection.
    attention_method: reattention_exact
    attention_method_kwargs:
      # Paper hparams (eval_reattn_niah.py tag '-reattn-32.4x32.4096.512-gu-clip127')
      global_size: 32           # sink tokens always in the recall view
      local_size: 4096          # local window; the exact port 128-aligns it per chunk
                                # (unconditional reference quirk); must stay
                                # >= prefill_chunk_size + 128 when pe_original: false
      mid_size: 4               # top-k middle keys per (head, query); mid_size in {1,4} enables the kernel
      span_size: 32             # span expansion (verbatim reference floor semantics)
      recall_type: qk           # qk | qkv | qkv2 | k | v  ('_pe' variants rejected)
      recall_clip: 127          # PAPER VALUE (k'=127).  LOAD-BEARING:
                                # 32 global + 127*32 span + 4096 local = 8192 = the native
                                # window, so the pe_original=false contiguous re-rotation
                                # stays in-distribution.  -1 (no cap) lets 512-query prefill
                                # chunks recall nearly the whole middle -> view ~16k on an
                                # 8k model -> positional OOD -> degenerate output (the
                                # 2026-06-11 0%-on-everything runs).
      use_triton_kernel: force  # auto | force | "off" (QUOTE "off"!).  The exact port's
                                # 128-alignment satisfies the kernel constraint by
                                # construction, so on CUDA the kernel engages for
                                # multi-token chunks (never on qlen==1 decode steps —
                                # those are exempt from force-raising by design).
                                # force > auto for paper runs: 'auto' silently falls
                                # back to dense selection on kernel-compile failures
                                # (kernel is a block-max approximation ≠ dense, so a
                                # mid-run fallback MIXES selection semantics across
                                # samples — happened 2026-06-11 when a TMPDIR sweep
                                # broke ptxas mid-run).
      prefill_chunk_size: 512   # query-chunk length for prefill (reference wrapper chunk_size)
      recall_option: whole      # whole | default | generate_only | prefill_only | full_attn
                                # whole = recall every chunk AND every decode step (reference default);
                                # full_attn = exact no-method baseline
      chunk_schedule: reference # reference | uniform (reference = wrapper's engineered
                                # first chunk + qlen==1 generate-classified last token)
      pe_original: false        # CONSTRUCTOR DEFAULT IS true (keys at original absolute
                                # positions — position-OOD past 8192 on this model).
                                # false = the setting EVERY published reference eval uses:
                                # the selected view is re-rotated contiguously, bounding all
                                # relative distances by the view size — this is what actually
                                # extends context
      use_flash_attn: "auto"    # "off" | auto | force — per-chunk attention backend
                                # (MUST be quoted: bare off parses as YAML boolean false,
                                # and `False or "auto"` silently turns it into auto)
      debug_record_selection: false  # record per-layer selected positions (test/debug aid)
