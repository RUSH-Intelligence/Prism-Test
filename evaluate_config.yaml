# Standalone vLLM and RAG eval harness config for Prism-Test

# Available benchmarks:
# aime, aime2024, aime2025, infinite_bench, mock_benchmark,
# ruler, ruler16k, ruler32k, ruler64k, ruler128k, longbench, longbenchv2,
# loft, loft_rag, loogle, prism1m, zero_scrolls
benchmark: ruler32k
# Optional comma-separated subset list. Leave null to use benchmark defaults.
# Examples:
#   "qa_1,qa_2" for ruler32k
#   "passkey,kv_retrieval" for infinite_bench
#   "narrativeqa,hotpotqa" for longbench
#   "0shot" for longbenchv2
#   "nq_32k,hotpotqa_32k" for loft
subsets: niah_multikey_2,niah_multikey_3

backend: hf   # vllm, hf, or rag

model: meta-llama/Llama-3.1-8B-Instruct   # ignored if backend = rag

# Runtime
tensor_parallel_size: 1
dtype: auto
max_model_len: 50000
gpu_memory_utilization: 0.9
trust_remote_code: true
enable_prefix_caching: true

# Long-context compression for research backends (especially backend: hf).
enable_long_context_compression: false
compression_sink_tokens: 32
compression_local_tokens: 4096
# null means use all remaining budget after sink/local.
compression_top_k_tokens: null
# Expand each selected middle token by +/- span//2 before merge.
compression_span_tokens: 32

# Naive HF ReAttention scorer setting: query window size used for per-layer QK scoring.
hf_naive_reattn_query_tokens: 128

# Generation
max_new_tokens: 128
temperature: 0.0
top_p: 1.0
# Optional instruction prepended to each prompt.
# Keep null for RULER-style benchmarks where prompts are already fully formatted.
system_prompt: null
seed: 42
max_requests: 200
# Eval controls
fraction: 1.0
max_requests_per_subset:
  qa_1: 100
  qa_2: 100
query_aware: false

output_dir: ./results

# Extra vLLM LLM(...) kwargs can go here, for example:
# Should remove if using hf backend
# llm_kwargs:
#   enforce_eager: true
# llm_kwargs:
#   decode_context_parallel_size: 1
