# Prism-Test eval harness config
#
# Available benchmarks:
#   aime, aime2024, aime2025, infinite_bench, mock_benchmark,
#   ruler, ruler16k, ruler32k, ruler64k, ruler128k,
#   longbench, longbenchv2, loft, loft_rag, loogle, prism1m, zero_scrolls
benchmark: ruler16k
# Optional comma-separated subset list. Leave null for benchmark defaults.
# Examples: "qa_1,qa_2" for ruler64k | "passkey,kv_retrieval" for infinite_bench
subsets: qa_1

# Inference backend: vllm | hf | rag | research
backend: research

model: mistralai/Ministral-3-3B-Instruct-2512

# Runtime
tensor_parallel_size: 1
dtype: bfloat16
max_model_len: 65536
gpu_memory_utilization: 0.9
trust_remote_code: true
enable_prefix_caching: true

# Generation
max_new_tokens: 128
temperature: 0.0
top_p: 1.0
system_prompt: null
seed: 42

# Evaluation limits
max_requests: 200
max_requests_per_subset:
  qa_1: 200
fraction: 1.0
query_aware: false

output_dir: ./results

llm_kwargs:
  attn_implementation: flash_attention_2
  cache_config:
    sketch_name: none
    compression_ratio: 0
    max_context_length: 65536
    log_cache_seq_len: true
