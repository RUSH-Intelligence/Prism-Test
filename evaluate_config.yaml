# Standalone vLLM eval harness config for Prism-Test

# Available benchmarks: aime, ruler32k, longbench, longbenchv2, loft, prism1m
benchmark: prism1m
# Optional comma-separated subset list. Leave null to use benchmark defaults.
# Examples:
#   "qa_1,qa_2" for ruler32k
#   "narrativeqa,hotpotqa" for longbench
#   "0shot" for longbenchv2
#   "nq_32k,hotpotqa_32k" for loft
subsets: /scratch/sj157/Prism-Test/datasets/Prism-Data/1M/qa_1.jsonl

model: Qwen/Qwen2.5-7B-Instruct-1M

# Runtime
tensor_parallel_size: 8
dtype: auto
max_model_len: 1000000
gpu_memory_utilization: 0.9
trust_remote_code: true
enable_prefix_caching: true

# Generation
max_new_tokens: 64
temperature: 0.0
top_p: 1.0
seed: 42

# Eval controls
fraction: 1.0
max_requests: 1
query_aware: false

output_dir: ./results

# Extra vLLM LLM(...) kwargs can go here, for example:
# llm_kwargs:
#   enforce_eager: true
llm_kwargs:
  decode_context_parallel_size: 8
