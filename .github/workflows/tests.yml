name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers pandas numpy scipy pyyaml tqdm

      - name: Run tests
        run: python -m unittest discover eval_harness/tests -v
